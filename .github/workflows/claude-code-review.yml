name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.py"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request and post your findings as inline comments and a summary comment. Focus on:

            1. **Bugs & Logic Errors** - edge cases, incorrect assumptions, off-by-one errors
            2. **Security** - injection, auth issues, sensitive data exposure
            3. **Code Quality** - adherence to project patterns (FastMCP, Pydantic, async/await)
            4. **Performance** - inefficient queries, unnecessary blocking calls
            5. **Test Coverage** - missing or inadequate tests for changed code

            Be concise. Use inline comments for specific issues, a top-level comment for overall summary.
            Skip style nits that Ruff already enforces.
          claude_args: >-
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
