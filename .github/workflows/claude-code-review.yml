name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.py"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request and post your findings as a PR comment. Focus on:
            - Bugs, logic errors, or edge cases
            - Security vulnerabilities (OWASP Top 10, injection, auth issues)
            - Code quality and adherence to project patterns (FastMCP, async/await)
            - Performance concerns
            - Missing or inadequate test coverage

            Be concise. Group findings by severity (critical / warning / suggestion).
            Skip trivial style nits that Ruff already enforces.
